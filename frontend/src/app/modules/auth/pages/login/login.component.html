<div class="login-container">
  <div class="left-panel">
    <div class="brand-info">
      <img src="favicon.ico" alt="Logo Chifa Xin Yan" class="brand-logo">
      <h1 class="brand-name">Chifa Xin Yan</h1>
      <p class="brand-sub">Auténtico sabor oriental en cada plato</p>
    </div>
  </div>
  
  <div class="right-panel">
    <div class="login-form-container">
      <div class="form-header">
        <i class="fas fa-sign-in-alt"></i>
        <h2>Iniciar Sesión</h2>
        <p>Ingresa tus credenciales</p>
      </div>
      
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" (input)="email = $any($event.target).value" placeholder="Ingrese su correo" required>
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="password" (input)="password = $any($event.target).value" placeholder="Ingrese su contraseña" required>
            <i class="fas fa-eye-slash toggle-password" (click)="togglePassword()"></i>
          </div>
        </div>
        
        <button type="submit" class="login-button">Ingresar</button>
        
        <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      </form>
    </div>
  </div>
</div>
